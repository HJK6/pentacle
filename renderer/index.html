<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Dashboard</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">

<body>
  <!-- Titlebar (draggable) -->
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-text" id="titlebar-text">PENTACLE</span>
    </div>
    <div class="titlebar-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9790;</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="view-switcher">
        <button class="view-btn active" id="view-chats" data-view="chats">Chats</button>
        <button class="view-btn" id="view-dashboards" data-view="dashboards">Dashboards</button>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tab-sessions" data-tab="sessions">Sessions</button>
        <button class="sidebar-tab" id="tab-bots" data-tab="bots">Bots</button>
      </div>

      <!-- Sessions Panel -->
      <div class="sidebar-panel" id="panel-sessions">
        <div class="sidebar-toolbar">
          <button class="sb-btn sb-btn-green" id="btn-new" title="New Session">+ New</button>
          <button class="sb-btn" id="btn-cleanup" title="Cleanup dead sessions">Cleanup</button>
          <button class="sb-btn" id="btn-refresh" title="Refresh">Refresh</button>
        </div>
        <div class="sidebar-stats" id="stats"></div>
        <div class="session-list" id="session-list"></div>
        <div class="trash-section" id="trash-section"></div>
      </div>

      <!-- Bots Panel -->
      <div class="sidebar-panel" id="panel-bots" style="display:none">
        <div class="sidebar-stats" id="bots-stats"></div>
        <div class="bot-list" id="bot-list"></div>
      </div>

      <!-- Dashboard List Panel (hidden by default) -->
      <div class="sidebar-panel" id="panel-dashboards" style="display:none">
        <div class="dashboard-list" id="dashboard-list"></div>
      </div>

      <!-- Mic Control Panel -->
      <div class="mic-panel" id="mic-panel">
        <div class="mic-header">
          <span class="mic-icon" id="mic-icon">&#127908;</span>
          <span class="mic-title">MIC</span>
          <span class="mic-status-dot" id="mic-status-dot"></span>
        </div>
        <div class="mic-modes">
          <button class="mic-btn mic-toggle" id="mic-btn-toggle" title="Toggle mic on/off">Off</button>
          <button class="mic-btn mic-btn-copy" id="mic-btn-copy" title="Start/stop clipboard capture">Copy</button>
          <button class="mic-btn mic-btn-meeting" id="mic-btn-meeting" title="Start/stop meeting recording">Meeting</button>
        </div>
        <div class="mic-info" id="mic-info"></div>
        <div class="mic-transcript-preview" id="mic-transcript-preview"></div>
      </div>

      <div class="usage-footer" id="usage-footer"></div>
      <div class="usage-footer" id="codex-usage-footer"></div>
    </div>

    <!-- Terminal Grid -->
    <div class="grid">
      <div class="grid-cell" id="cell-0">

  <!-- Rename modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <h3 id="modal-title">Rename Session</h3>
      <input id="modal-input" type="text" placeholder="New name...">
      <div class="modal-actions">
        <button class="sb-btn" id="modal-cancel">Cancel</button>
        <button class="sb-btn sb-btn-blue" id="modal-confirm">Rename</button>
      </div>
    </div>
  </div>

  <!-- New Session modal — agent selector -->
  <div class="modal-overlay" id="new-session-overlay" style="display:none">
    <div class="modal">
      <h3>New Session</h3>
      <!-- Location toggle — shown only in client mode (main.js: IS_CLIENT=true) -->
      <div id="new-session-location" style="display:none;gap:8px;margin-top:8px">
        <button class="sb-btn" data-loc="local" style="flex:1">Local</button>
        <button class="sb-btn" data-loc="remote" style="flex:1">Remote</button>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="sb-btn sb-btn-green" id="new-session-claude" style="flex:1;padding:12px;font-size:14px">Claude</button>
        <button class="sb-btn sb-btn-blue" id="new-session-codex" style="flex:1;padding:12px;font-size:14px">Codex</button>
      </div>
      <div class="modal-actions" style="margin-top:12px">
        <button class="sb-btn" id="new-session-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="dashboards/registry.js"></script>
  <script src="dashboards/0dte.js"></script>
  <script src="dashboards/foreclosure.js"></script>
  <script src="dashboards/scraper-bot.js"></script>
  <script src="dashboards/amaterasu.js"></script>
  <script src="dashboards/chat-stream.js"></script>
  <script src="app.js"></script>
</body>
</html>
