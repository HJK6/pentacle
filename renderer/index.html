<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pentacle</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Titlebar (draggable) -->
  <div class="titlebar">
    <span class="titlebar-text">PENTACLE</span>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tab-sessions" data-tab="sessions">Sessions</button>
        <button class="sidebar-tab" id="tab-bots" data-tab="bots">Bots</button>
      </div>

      <!-- Sessions Panel -->
      <div class="sidebar-panel" id="panel-sessions">
        <div class="sidebar-toolbar">
          <button class="sb-btn sb-btn-green" id="btn-new" title="New Session">+ New</button>
          <button class="sb-btn" id="btn-cleanup" title="Cleanup dead sessions">Cleanup</button>
          <button class="sb-btn" id="btn-refresh" title="Refresh">Refresh</button>
        </div>
        <div class="sidebar-stats" id="stats"></div>
        <div class="session-list" id="session-list"></div>
        <div class="trash-section" id="trash-section"></div>
      </div>

      <!-- Bots Panel -->
      <div class="sidebar-panel" id="panel-bots" style="display:none">
        <div class="sidebar-stats" id="bots-stats"></div>
        <div class="bot-list" id="bot-list"></div>
      </div>

      <!-- Mic Control Panel -->
      <div class="mic-panel" id="mic-panel">
        <div class="mic-header">
          <span class="mic-icon" id="mic-icon">&#127908;</span>
          <span class="mic-title">MIC</span>
          <span class="mic-status-dot" id="mic-status-dot"></span>
        </div>
        <div class="mic-modes">
          <button class="mic-btn mic-toggle" id="mic-btn-toggle" title="Toggle mic on/off">Off</button>
        </div>
        <div class="mic-info" id="mic-info"></div>
        <div class="mic-transcript-preview" id="mic-transcript-preview"></div>
      </div>

      <div class="usage-footer" id="usage-footer"></div>
      <div class="usage-footer" id="codex-usage-footer" style="display:none"></div>
    </div>

    <!-- Terminal Grid -->
    <div class="grid">
      <div class="grid-cell" id="cell-0">

          <span class="cell-label">Slot 1</span>
          <div class="cell-actions">

            <button class="cell-trash" data-slot="0" title="Move to trash"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg></button>
            <button class="cell-maximize" data-slot="0" title="Maximize"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg></button>
            <button class="cell-close" data-slot="0" title="Detach">&times;</button>
          </div>
        </div>
        <div class="cell-terminal" id="term-0"></div>

      </div>

        <div class="cell-header" id="header-1">
          <span class="cell-label">Slot 2</span>
          <div class="cell-actions">
            <button class="cell-edit" data-slot="1" title="Rename"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175l-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg></button>

          </div>
        </div>
        <div class="cell-terminal" id="term-1"></div>

      </div>

          <span class="cell-label">Slot 3</span>
          <div class="cell-actions">

            <button class="cell-trash" data-slot="2" title="Move to trash"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg></button>
            <button class="cell-maximize" data-slot="2" title="Maximize"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg></button>

      </div>
    </div>
  </div>

  <!-- New Session modal -->
  <div class="modal-overlay" id="new-session-overlay" style="display:none">
    <div class="modal">
      <h3>New Session</h3>
      <div id="new-session-location" style="display:none;margin-bottom:12px">
        <div style="display:flex;gap:6px">
          <button class="sb-btn new-loc-btn active" data-loc="local" style="flex:1;padding:6px;font-size:11px">This PC</button>
          <button class="sb-btn new-loc-btn" data-loc="remote" style="flex:1;padding:6px;font-size:11px">Mac Mini</button>
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <button class="sb-btn sb-btn-green" id="new-session-claude" style="flex:1;padding:12px;font-size:14px">Claude</button>
        <button class="sb-btn sb-btn-codex" id="new-session-codex" style="flex:1;padding:12px;font-size:14px">Codex</button>
      </div>
      <div style="margin-top:12px;text-align:center">
        <button class="sb-btn" id="new-session-cancel" style="padding:6px 16px">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Rename modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <h3 id="modal-title">Rename Session</h3>
      <input id="modal-input" type="text" placeholder="New name...">
      <div class="modal-actions">
        <button class="sb-btn" id="modal-cancel">Cancel</button>
        <button class="sb-btn sb-btn-blue" id="modal-confirm">Rename</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
